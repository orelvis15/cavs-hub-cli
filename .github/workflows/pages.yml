name: Deploy landing to GitHub Pages

on:
  # Deploy on pushes to main that touch the landing page.
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/pages.yml"
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Grant the token the permissions Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; don't cancel an in-flight release.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (build_type=workflow) if it isn't already,
          # so the deploy never fails on a "Get Pages site" 404.
          enablement: true

      - name: Upload landing/ as the Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
